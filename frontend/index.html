<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asistente Médico Clínico</title>
    <style>
        :root {
            --primary: #0b5fb4; 
            --bg-body: #eef2f5;
            --chat-bg: #ffffff;
            --user-msg: #0b5fb4;
            --bot-msg: #f1f3f4;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-body);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .chat-container {
            width: 100%;
            max-width: 600px;
            height: 85vh;
            background: var(--chat-bg);
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .chat-header {
            background-color: var(--primary);
            color: white;
            padding: 20px;
            text-align: center;
            font-size: 1.2rem;
            font-weight: bold;
        }
        .chat-box {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .message {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 0.95rem;
            line-height: 1.5;
            word-wrap: break-word;
        }
        .user-message {
            background-color: var(--user-msg);
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 0px;
        }
        .bot-message {
            background-color: var(--bot-msg);
            color: #333;
            align-self: flex-start;
            border-bottom-left-radius: 0px;
            border: 1px solid #e0e0e0;
        }
        .input-area {
            display: flex;
            padding: 15px;
            background: #fff;
            border-top: 1px solid #ddd;
        }
        #user-input {
            flex: 1;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 6px;
            outline: none;
            font-size: 1rem;
        }
        #user-input:focus { border-color: var(--primary); }
        #send-btn {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 0 20px;
            margin-left: 10px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 1rem;
            transition: background 0.3s;
        }
        #send-btn:hover { background-color: #064585; }
        .loading {
            font-style: italic;
            color: #888;
            font-size: 0.85rem;
            align-self: flex-start;
            margin-left: 10px;
            display: none; 
        }
    </style>
</head>
<body>

<div class="chat-container">
    <div class="chat-header">🩺 Asistente de Diagnóstico Clínico</div>
    
    <div class="chat-box" id="chat-box">
        <div class="message bot-message">Hola, soy tu asistente médico virtual con arquitectura RAG. ¿En qué te puedo ayudar hoy?</div>
    </div>
    
    <div class="loading" id="loading-indicator">Analizando síntomas en la base de datos...</div>

    <div class="input-area">
        <input type="text" id="user-input" placeholder="Escribe los síntomas del paciente acá..." autocomplete="off">
        <button id="send-btn">Enviar</button>
    </div>
</div>

<script>
    const chatBox = document.getElementById("chat-box");
    const userInput = document.getElementById("user-input");
    const sendBtn = document.getElementById("send-btn");
    const loadingIndicator = document.getElementById("loading-indicator");

    function appendMessage(text, sender) {
        const msgDiv = document.createElement("div");
        msgDiv.classList.add("message");
        msgDiv.classList.add(sender === "user" ? "user-message" : "bot-message");
        
        msgDiv.innerHTML = text.replace(/\n/g, '<br>'); 
        
        chatBox.appendChild(msgDiv);
        chatBox.scrollTop = chatBox.scrollHeight; 
    }

    async function sendMessage() {
        const text = userInput.value.trim();
        if (!text) return;

        appendMessage(text, "user");
        userInput.value = "";

        loadingIndicator.style.display = "block";

        try {
            const response = await fetch("http://localhost:8000/query", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ query: text })
            });

            const data = await response.json();

            appendMessage(data.response, "bot");

        } catch (error) {
            appendMessage("⚠️ Error de conexión. Verificá que el servidor FastAPI esté corriendo en el puerto 8000.", "bot");
            console.error(error);
        } finally {
            loadingIndicator.style.display = "none";
        }
    }

    sendBtn.addEventListener("click", sendMessage);
    userInput.addEventListener("keypress", function(event) {
        if (event.key === "Enter") {
            sendMessage();
        }
    });
</script>

</body>
</html>
