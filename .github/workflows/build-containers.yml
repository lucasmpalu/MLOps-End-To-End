name: Build and Push ALL Images to ECR

on:
  push:
    branches:
      - main
    paths: 
      - 'backend/**'
      - 'frontend/**'
      - 'RAG_Airflow/**'
      - 'fine-tunning/**'
      - 'ollama_setup/**'

env:
  AWS_REGION: us-east-1

permissions:
  id-token: write
  contents: read

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del código
        uses: actions/checkout@v3

      - name: Configurar Credenciales de AWS
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login a Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v1

      # ... (Acá van todos tus pasos de Docker Build & Push que ya tenés) ...
      # 1. Airflow, 2. Worker Ingesta, 3. Train Worker, 4. Backend, 5. Frontend, 6. Ollama

  deploy-to-eks:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del código
        uses: actions/checkout@v3

      - name: Configurar Credenciales de AWS
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Instalar kubectl
        uses: azure/setup-kubectl@v3

      - name: Configurar acceso al Cluster EKS
        run: |
          aws eks update-kubeconfig --region us-east-1 --name lostsys-cluster-dev

      # === PASO CRUCIAL PARA TUS SECRETOS ===
      - name: Crear archivo de secretos de Kubernetes
        run: |
          echo "${{ secrets.K8S_SECRETS }}" > infra/kubernetes/secrets.yaml

      - name: Aplicar Manifiestos de Kubernetes
        run: |
          # Aplicamos los secretos PRIMERO para que los pods no den error al nacer
          kubectl apply -f infra/kubernetes/secrets.yaml
          kubectl apply -f infra/kubernetes/policies.yaml
          
          # Aplicamos el resto
          kubectl apply -f infra/kubernetes/ollama.yaml
          kubectl apply -f infra/kubernetes/train_and_mlflow.yaml
          kubectl apply -f infra/kubernetes/fastapi.yaml
          kubectl apply -f infra/kubernetes/airflow.yaml
          kubectl apply -f infra/kubernetes/frontend.yaml # <--- ¡No te olvides del front!
          
          # Reinicio para asegurar la última imagen
          kubectl rollout restart deployment ollama-deployment
          kubectl rollout restart deployment fastapi-deployment