apiVersion: batch/v1
kind: Job
metadata:
  name: ingesta-rag-worker
  namespace: airflow
spec:
  template:
    spec:
      containers:
      - name: worker
        image: 559979279038.dkr.ecr.us-east-1.amazonaws.com/ingesta-worker:latest
        env:
          - name: DATABASE_URL
            valueFrom:
              secretKeyRef:
                name: rds-secrets
                key: url
          - name: ARCHIVOS_NUEVOS
            value: ""
          - name: INDEX_NAME
            value: "rag_llm"

        resources:
          limits:
            memory: "1Gi"
            cpu: "500m"
      restartPolicy: Never