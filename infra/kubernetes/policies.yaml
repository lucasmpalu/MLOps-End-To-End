apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: ollama-security-policy
spec:
  podSelector:
    matchLabels:
      app: ollama

  policyTypes:
  - Ingress

  ingress:
  - from:
    - podSelector:
        matchLabels:
          app: fastapi
    ports:
    - protocol: TCP
      port: 11434